<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="ISO-8859-1">
   <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  
    <title>UserProfileForm</title>
</head>
<body>

    <nav th:replace="~{fragments/nav-bar :: nav-bar}"></nav>

	<p th:text="${msg}">Hello</p>

    <div class="container" style="margin-top: 30px;">
        <div class="panel panel-default">
            
            <div class="panel-heading">
                <h2>Profile List</h2>
            </div>
    
            <div class="panel-body">
                <div class="table-responsive">
                    <table class="table table-bordered table-striped">
                        <thead>
                            <tr>
                                <th>Profile Image</th>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Age</th>
                                <th>Address</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- The loop happens here on the <tr> row tag -->
                            <tr th:each="user : ${userList}">
                                <td>
                                <a th:href="@{/user/list/{userId}(userId=${user.userId})}" > 
                                    <!-- Displays the uploaded image dynamically -->
                                    <img th:src="@{${user.profileImgPath}}" 
                                         class="img-thumbnail" 
                                         style="width: 60px; height: 60px; object-fit: cover;" 
                                         alt="Profile">
                                         
                                 </a>     
                                         
                                </td>
                                
                                <td th:text="${user.userName}"></td>
                                <td th:text="${user.userEmail}"></td>
                                <td th:text="${user.userAge}"></td>
                                <td th:text="${user.userAddress}"></td>
                                <td>
                                	<a th:href="@{/user/list/{userId}(userId=${user.userId})}" class="btn btn-success "> Info</a>
                                	<a th:href="@{/user/edit/{userId}(userId=${user.userId})}" class="btn btn-primary "> Edit</a>
                                    <a th:href="@{/user/delete/{userId}(userId=${user.userId})}" class="btn btn-danger">Delete</a>
                                    
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
    
        </div>
    </div>

</body>
</html>
