<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>User Info</title>

<!-- Bootstrap 5 -->
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
	rel="stylesheet">

</head>

<body>

	<!-- NAVBAR -->
	<nav th:replace="~{fragments/nav-bar :: nav-bar}"></nav>

	<div class="container mt-5">

		<div class="row justify-content-center">

			<div class="col-md-6">

				<div class="card shadow-lg border-0">

					<div class="card-header bg-dark text-white text-center">
						<h4>User Information</h4>
					</div>

					<div class="card-body text-center">

						<!-- PROFILE IMAGE -->
						<img th:src="@{${userObj.profileImgPath}}"
						     class="rounded-circle mb-3"
						     width="120"
						     height="120"
						     alt="User Image">

						<!-- USER DETAILS -->
						<h5 class="mb-2">
							<span th:text="${userObj.userName}"></span>
						</h5>

						<p class="text-muted mb-1">
							Email: <span th:text="${userObj.userEmail}"></span>
						</p>

						<p class="text-muted mb-1">
							Age: <span th:text="${userObj.userAge}"></span>
						</p>

						<p class="text-muted">
							Address: <span th:text="${userObj.userAddress}"></span>
						</p>

					<!-- 	ACTION BUTTONS
						<div class="mt-3">

							<a th:href=""
							   class="btn btn-primary btn-sm">
								Edit
							</a>

							<a th:href="@{'/user/delete/' + ${user.id}}"
							   class="btn btn-danger btn-sm"
							   onclick="return confirm('Are you sure?')">
								Delete
							</a>

							

						</div> -->

					</div>

				</div>

			</div>

		</div>

	</div>

	<!-- Bootstrap JS -->
	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js">
	</script>

</body>

</html>
