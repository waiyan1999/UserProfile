<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="ISO-8859-1">

<meta name="viewport" content="width=device-width, initial-scale=1">

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
	rel="stylesheet">

<title>UserProfileForm</title>

<style>

	body{
		background-color:#f8f9fa;
	}

	.card{
		border:none;
		border-radius:15px;
		box-shadow:0px 4px 10px rgba(0,0,0,0.1);
	}

</style>

</head>

<body>

	<!-- NAVBAR -->
	<nav th:replace="~{fragments/nav-bar :: nav-bar}"></nav>

	<!-- FORM CONTAINER -->
	<div class="container mt-5">

		<div class="row justify-content-center">

			<div class="col-md-6">

				<div class="card">

					<div class="card-header bg-dark text-white text-center">
						
					
						
						<h3>User Profile Form</h3>

					</div>

					<div class="card-body">

						<form th:action="@{/user/create}"
						      th:object="${userObj}"
						      method="post"
						      enctype="multipart/form-data">

							<!-- NAME -->
							<div class="mb-3">

								<label for="userName" class="form-label">
									Name
								</label>


								<input type="text"
								       id="userName"
								       th:field="*{userName}"
								       class="form-control"
								       placeholder="Enter name">
								<span th:if="${#fields.hasErrors('userName')}"
									th:errors="*{userName}"
									class="text-danger"></span>

							</div>

							<!-- EMAIL -->
							<div class="mb-3">

								<label for="userEmail" class="form-label">
									Email
								</label>

								<input type="email"
								       id="userEmail"
								       th:field="*{userEmail}"
								       class="form-control"
								       placeholder="Enter email">

								<span th:if="${#fields.hasErrors('userEmail')}"
									th:errors="*{userEmail}"
									class="text-danger"></span>

							</div>

							<!-- AGE -->
							<div class="mb-3">

								<label for="userAge" class="form-label">
									Age
								</label>

								<input type="text"
								       id="userAge"
								       th:field="*{userAge}"
								       class="form-control"
								       placeholder="Enter age">

							<span th:if="${#fields.hasErrors('userAge')}"
								th:errors="*{userAge}"
								class="text-danger"></span>

							</div>

							<!-- ADDRESS -->
							<div class="mb-3">

								<label for="userAddress" class="form-label">
									Address
								</label>

								<input type="text"
								       id="userAddress"
								       th:field="*{userAddress}"
								       class="form-control"
								       placeholder="Enter address">

									   <span th:if="${#fields.hasErrors('userAddress')}"
											th:errors="*{userAddress}"
											class="text-danger"></span>

							</div>

							<!-- IMAGE -->
							<div class="mb-4">

								<label for="imgFile" class="form-label">
									User Profile Image
								</label>

								<input type="file"
								       id="imgFile"
								       name="file"
								       class="form-control"
									   >

								<span th:text="${fileError}" class="text-danger"></span>

							</div>

							<!-- BUTTON -->
							<div class="d-grid">

								<button type="submit"
								        class="btn btn-primary">

									Create User Profile

								</button>

							</div>

						</form>

					</div>

				</div>

			</div>

		</div>

	</div>

	<!-- Bootstrap JS -->
	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js">
	</script>

</body>

</html>
