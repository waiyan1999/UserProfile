<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="ISO-8859-1">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
    <title>UserProfileForm</title>
</head>
<body>

    <div class="container" style="margin-top: 30px;">
        <div class="panel panel-default" style="max-width: 500px; margin: 0 auto; padding: 20px;">
            <div class="panel-heading">
                <h3 class="panel-title">User Profile Form</h3>
            </div>
            <div class="panel-body">
            
                <form th:action="@{/user/create}" th:object="${userObj}" method="post" enctype="multipart/form-data">
        
                    <div class="form-group">
                        <label for="userName">Name</label>
                        <input type="text" id="userName" th:field="*{userName}" class="form-control" placeholder="Enter name">
                    </div>
        
                    <div class="form-group">
                        <label for="userAge">Age</label>
                        <input type="text" id="userAge" th:field="*{userAge}" class="form-control" placeholder="Enter age">
                    </div>
        
                    <div class="form-group">
                        <label for="userAddress">Address</label>
                        <input type="text" id="userAddress" th:field="*{userAddress}" class="form-control" placeholder="Enter address">
                    </div>
        
                    <div class="form-group">
                        <label for="imgFile">User Profile Image</label>
                        <input th:type="file" id="imgFile" name="file" class="form-control">
                    </div>
        
                    <button type="submit" class="btn btn-primary btn-block">Create User Profile</button>
        
                </form>
                
            </div>
        </div>
    </div>

	<a th:href="@{/user/list}">UserList</a>

</body>
</html>
